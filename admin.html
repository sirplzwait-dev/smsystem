<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Super Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* CSS wahi rahega jo aapka hai */
        body { font-family: sans-serif; padding: 20px; background: #f4f6f9; }
        .top-bar { display: flex; justify-content: space-between; background: #2c3e50; padding: 15px; color: #ffd700; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th { background: #8b0000; color: white; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #ddd; text-align: center; }
    </style>
</head>
<body>

<div class="top-bar">
    <button onclick="window.location.href='index.html'">🔙 मुख्य पेज</button>
    <span>Super Admin Dashboard (Supabase)</span>
</div>

<div class="stats-box" style="display:flex; gap:20px; margin-top:20px;">
    <div style="padding:15px; background:#27ae60; color:white; flex:1; text-align:center;">👥 गेस्ट: <span id="totalGuests">0</span></div>
    <div style="padding:15px; background:#e67e22; color:white; flex:1; text-align:center;">💰 कुल शगुन: ₹<span id="rawAmount">0</span></div>
</div>

<div class="card">
    <button onclick="deleteAllData()" style="background:#c0392b; color:white; padding:10px; border:none; cursor:pointer;">🗑️ सारा डेटा डिलीट करें</button>
    <table>
        <thead>
            <tr><th>नाम</th><th>राज्य</th><th>जिला</th><th>शगुन</th><th>एक्शन</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div class="card" style="margin-top:20px;">

<h2>💰 Cash History</h2>

<div style="display:flex;gap:15px;margin-bottom:15px;flex-wrap:wrap;">

<div style="background:#c0392b;color:#fff;padding:10px;border-radius:8px;">
Withdraw : ₹<span id="totalWithdraw">0</span>
</div>

<div style="background:#27ae60;color:#fff;padding:10px;border-radius:8px;">
Deposit : ₹<span id="totalDeposit">0</span>
</div>

<button
onclick="resetCashHistory()"
style="background:#000;color:#fff;padding:10px 20px;border:none;border-radius:6px;cursor:pointer;">
🗑 Reset Cash History
</button>

</div>

<table>

<thead>

<tr>

<th>Name</th>

<th>Type</th>

<th>Amount</th>

<th>Date</th>

<th>Delete</th>

</tr>

</thead>

<tbody id="cashTableBody"></tbody>

</table>

</div>



<script>
const sb = window.supabase.createClient(
    "https://rdlliurzgwwfjscgwssa.supabase.co",
    "sb_publishable_HX1QmjO0SPyW3rUoihZkkQ_tRTE1bLc"
);

async function loadData() {

const {
    data: { user }
} = await sb.auth.getUser();

if (!user) {
    window.location.href = "login.html";
    return;
}





    const { data, error } = await sb
    .from("guests")
    .select("*")
    .eq("user_id", user.id);
	
	
    if(error) { alert(error.message); return; }

    let tbody = document.getElementById('tableBody');
    tbody.innerHTML = "";
    let total = 0;

    data.forEach(g => {
        total += Number(g.amount);
        tbody.innerHTML += `
        <tr>
            <td>${g.name}</td><td>${g.state}</td><td>${g.district}</td><td>₹${g.amount}</td>
            <td><button onclick="deleteEntry(${g.id})" style="background:red; color:white;">🗑️</button></td>
        </tr>`;
    });

    document.getElementById('totalGuests').innerText = data.length;
    document.getElementById('rawAmount').innerText = total;
}

async function deleteEntry(id) {
    if(confirm("रिकॉर्ड डिलीट करें?")) {
        const {
    data: { user }
} = await sb.auth.getUser();

await sb
.from("guests")
.delete()
.eq("id", id)
.eq("user_id", user.id);
        loadData();
    }
}

async function deleteAllData() {

    const {
        data: { user }
    } = await sb.auth.getUser();

    if(confirm("आपका पूरा डेटा डिलीट हो जाएगा!")){

        const { error } = await sb
        .from("guests")
        .delete()
        .eq("user_id", user.id);

        if(error){
            alert(error.message);
            return;
        }

        loadData();
    }

}

async function loadCashHistory(){

    const tbody = document.getElementById("cashTableBody");
    tbody.innerHTML = "";

    let withdraw = 0;
    let deposit = 0;

    const {
        data:{user}
    } = await sb.auth.getUser();

    const { data, error } = await sb
    .from("cash_history")
    .select("*")
    .eq("user_id", user.id)
    .order("created_at",{ascending:false});

    if(error){
        console.log(error);
        return;
    }

    data.forEach(c=>{

        if(c.type==="withdraw"){
            withdraw += Number(c.amount);
        }else{
            deposit += Number(c.amount);
        }

        tbody.innerHTML += `
<tr>
<td>${c.person}</td>
<td>${c.type}</td>
<td>₹${c.amount}</td>
<td>${new Date(c.created_at).toLocaleString()}</td>
<td>
<button onclick="deleteCashEntry(${c.id})"
style="background:red;color:white;">
🗑
</button>
</td>
</tr>`;

    });

    document.getElementById("totalWithdraw").innerText = withdraw;
    document.getElementById("totalDeposit").innerText = deposit;

}






async function deleteCashEntry(id){

    if(!confirm("क्या इस Cash Entry को Delete करना चाहते हैं?")){
        return;
    }

    const {
        data:{user}
    } = await sb.auth.getUser();

    const { error } = await sb
    .from("cash_history")
    .delete()
    .eq("id",id)
    .eq("user_id",user.id);

    if(error){
        alert(error.message);
        return;
    }

    loadCashHistory();

}


async function resetCashHistory(){

const {
    data:{user}
} = await sb.auth.getUser();

    const pass = prompt("Admin Password दर्ज करें");

    if(pass===null){
        return;
    }

    if(pass.trim()!=="admin123"){
        alert("Wrong Password");
        return;
    }

    if(!confirm("पूरी Cash History Delete हो जाएगी. Continue?")){
        return;
    }

    const { error } = await sb
        .from("cash_history")
        .delete()
        .eq("user_id", user.id);

    if(error){
        alert(error.message);
        return;
    }

    alert("Cash History Reset Successfully");

    await loadCashHistory();

}



window.onload = async ()=>{

    await loadData();

    await loadCashHistory();

};

</script>
</body>
</html>
