<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sagun Management System | Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

background:linear-gradient(-45deg,#5b0000,#800000,#b8860b,#ffd700);

background-size:400% 400%;

animation:bgMove 12s ease infinite;

}

@keyframes bgMove{

0%{background-position:0% 50%;}

50%{background-position:100% 50%;}

100%{background-position:0% 50%;}

}

body::before{

content:"";

position:absolute;

width:260px;

height:260px;

background:rgba(255,255,255,.08);

border-radius:50%;

top:-80px;

left:-80px;

animation:float 8s infinite;

}

body::after{

content:"";

position:absolute;

width:330px;

height:330px;

background:rgba(255,255,255,.08);

border-radius:50%;

bottom:-120px;

right:-120px;

animation:float 8s infinite reverse;

}

@keyframes float{

50%{

transform:translateY(-25px);

}

}

.login-box{

width:420px;

padding:35px;

border-radius:25px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.25);

box-shadow:0 25px 50px rgba(0,0,0,.35);

text-align:center;

animation:fade .8s ease;

z-index:10;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.logo{

width:95px;

height:95px;

border-radius:50%;

border:4px solid #FFD700;

background:#fff;

padding:6px;

margin-bottom:15px;

}

h2{

color:#fff;

font-size:34px;

margin-bottom:8px;

}

.subtitle{

color:#fff;

margin-bottom:25px;

line-height:1.5;

}

.input-box{

margin-bottom:18px;

}

.input-box input{

width:100%;

padding:15px;

border:none;

border-radius:12px;

outline:none;

font-size:15px;

}

.password-box{

position:relative;

}

.password-box input{

padding-right:55px;

}

#togglePass{
position:absolute;
right:18px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:22px;
user-select:none;
z-index:1000;
color:#800000;
}


button{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:#FFD700;

color:#800000;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:translateY(-3px);

}

.links{

margin-top:18px;

display:flex;

justify-content:space-between;

}

.links a{

color:#fff;

text-decoration:none;

font-weight:600;

}

.version{

margin-top:25px;

color:#fff;

font-size:13px;

}

.spinner{
width:18px;
height:18px;
border:3px solid rgba(255,255,255,.4);
border-top:3px solid #800000;
border-radius:50%;
display:inline-block;
animation:spin .8s linear infinite;
vertical-align:middle;
margin-right:8px;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}


</style>

</head>

<body>

<div class="login-box">

<img src="appicon.ico" class="logo">

<h2>👋 Welcome Back</h2>

<p class="subtitle">
Sign in to continue to
<br>
<b>Sagun Management System</b>
</p>

<div class="input-box">

<input
type="email"
id="email"
placeholder="📧 Enter your Email">

</div>

<div class="input-box password-box">

<input
type="password"
id="pass"
placeholder="🔒 Enter Password">

<span id="togglePass">👁️</span>

</div>

<button id="loginBtn">

🔐 Login

</button>

<div class="links">

<a href="register.html">
📝 Register
</a>

<a href="#" onclick="forgotPassword(); return false;">
Forgot Password?
</a>

</div>

<div class="version">

Version 1.0.0

<br><br>

Powered by Sagun Management System

</div>
</div>

<script>






// ===============================
// Supabase
// ===============================

const supabase = window.supabase.createClient(
  "https://rdlliurzgwwfjscgwssa.supabase.co",
  "sb_publishable_HX1QmjO0SPyW3rUoihZkkQ_tRTE1bLc"
);


// Recover session after email verification
(async () => {

    const hash = window.location.hash;

    if(hash.includes("access_token")){

        const { data, error } = await supabase.auth.exchangeCodeForSession(window.location.href);

        if(error){
            console.log(error);
            return;
        }

        history.replaceState({}, "", "login.html");

        const { data: setupData } = await supabase
            .from("setup")
            .select("*")
            .eq("user_id", data.session.user.id)
            .limit(1);

        if(setupData.length > 0){
            window.location.href="home.html";
        }else{
            window.location.href="setup.html";
        }

    }

})();

document.addEventListener("DOMContentLoaded", async () => {

    const { data:{ session } } = await supabase.auth.getSession();

    if(session){

        const { data: setupData } = await supabase
        .from("setup")
        .select("*")
        .eq("user_id", session.user.id)
        .limit(1);
if (setupData && setupData.length > 0) {
    window.location.href = "home.html";
} else {
    window.location.href = "setup.html";
}

    }

});
// ===============================
// Show / Hide Password
// ===============================


document.getElementById("togglePass").onclick = function () {

    const pass = document.getElementById("pass");

    if (pass.type === "password") {
        pass.type = "text";
        this.innerHTML = "🙈";
    } else {
        pass.type = "password";
        this.innerHTML = "👁️";
    }

};
// ===============================
// Login
// ===============================

document.getElementById("loginBtn").addEventListener("click",checkLogin);

async function checkLogin(){

const btn=document.getElementById("loginBtn");

const email=document.getElementById("email").value.trim();
const password=document.getElementById("pass").value.trim();

if(!email || !password){

alert("Please Enter Email & Password");
return;

}

btn.disabled=true;
btn.innerHTML='<span class="spinner"></span>Logging in...';

const {data,error}=await supabase.auth.signInWithPassword({

email,
password

});

if(error){

alert(error.message);

btn.disabled = false;
btn.innerHTML = "🔐 Login";

return;

}
if (!data?.user?.email_confirmed_at) {
    alert("Please verify your email first.");
    await supabase.auth.signOut();

    btn.disabled = false;
    btn.innerHTML = "🔐 Login";
    return;
}

const {data:setupData}=await supabase

.from("setup")

.select("*")

.eq("user_id",data.user.id)

.limit(1);



if (setupData && setupData.length > 0) {

    window.location.href = "home.html";

} else {

    window.location.href = "setup.html";

}

}


document.getElementById("pass").addEventListener("keypress",function(e){

if(e.key==="Enter"){

checkLogin();

}

});






async function forgotPassword(){

const email=prompt("Enter your Registered Email");

if(!email) return;

const {error}=await supabase.auth.resetPasswordForEmail(email,{

redirectTo:"https://sgunms.in/reset-password.html"

});

if(error){

alert(error.message);

}else{

alert("Password Reset Link has been sent to your Email.");

}

}


</script>
</body>

</html>
