<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sagun Management System | Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* --- CSS same as before --- */
</style>
</head>
<body>
<div class="login-box">
  <img src="appicon.ico" class="logo">
  <h2>👋 Welcome Back</h2>
  <p class="subtitle">Sign in to continue to<br><b>Sagun Management System</b></p>

  <div class="input-box">
    <input type="email" id="email" placeholder="📧 Enter your Email">
  </div>

  <div class="input-box password-box">
    <input type="password" id="pass" placeholder="🔒 Enter Password">
    <span id="togglePass">👁️</span>
  </div>

  <button id="loginBtn">🔐 Login</button>

  <div class="links">
    <a href="register.html">📝 Register</a>
    <a href="#" onclick="forgotPassword(); return false;">Forgot Password?</a>
  </div>

  <div class="version">
    Version 1.0.0<br><br>Powered by Sagun Management System
  </div>
</div>

<script>
// ===============================
// Supabase Client
// ===============================
const client = window.supabase.createClient(
  "https://rdlliurzgwwfjscgwssa.supabase.co",
  "sb_publishable_HX1QmjO0SPyW3rUoihZkkQ_tRTE1bLc"
);

// ===============================
// Show / Hide Password
// ===============================
document.getElementById("togglePass").onclick = function () {
  const pass = document.getElementById("pass");
  if (pass.type === "password") {
    pass.type = "text";
    this.innerHTML = "🙈";
  } else {
    pass.type = "password";
    this.innerHTML = "👁️";
  }
};

// ===============================
// Login
// ===============================
document.getElementById("loginBtn").addEventListener("click", checkLogin);

async function checkLogin() {
  const btn = document.getElementById("loginBtn");
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("pass").value.trim();

  if (!email || !password) {
    alert("Please Enter Email & Password");
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Logging in...';

  const { data, error } = await client.auth.signInWithPassword({ email, password });

  if (error) {
    alert(error.message);
    btn.disabled = false;
    btn.innerHTML = "🔐 Login";
    return;
  }

  // ✅ Email confirmation check removed
  const { data: setupData } = await client
    .from("setup")
    .select("*")
    .eq("user_id", data.user.id)
    .limit(1);

  if (setupData && setupData.length > 0) {
    window.location.href = "home.html";
  } else {
    window.location.href = "setup.html";
  }
}

document.getElementById("pass").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    checkLogin();
  }
});

// ===============================
// Forgot Password
// ===============================
async function forgotPassword() {
  const email = prompt("Enter your Registered Email");
  if (!email) return;

  const { error } = await client.auth.resetPasswordForEmail(email, {
    redirectTo: "https://sgunms.in/reset-password.html"
  });

  if (error) {
    alert(error.message);
  } else {
    alert("Password Reset Link has been sent to your Email.");
  }
}
</script>
</body>
</html>
