<!DOCTYPE html>
<html lang="hi">
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>






    <style>
        body { font-family: 'Poppins', sans-serif; padding: 15px; background: #fdf6e3; margin: 0; }
      .summary-bar {
    background: #800000;
    color: white;
    padding: 15px;
    border-radius: 12px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
    font-weight: bold;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

        .container { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #800000; color: #ffd700; padding: 10px; }
        td { padding: 8px; border-bottom: 1px solid #ddd; text-align: center; }
        .note-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.note{
    width:60px;
    padding:5px;
    text-align:center;
    border:1px solid #800000;
    border-radius:4px;
}       
	   button { cursor: pointer; padding: 10px; border: none; border-radius: 6px; font-weight: bold; width: 100%; margin-top: 5px; }
    </style>
</head>
<body>

<div style="display:flex;gap:10px;justify-content:center;margin-bottom:10px;flex-wrap:wrap;">

    <button onclick="exportExcel()"
    style="background:#27ae60;color:white;width:150px;">
        📊 Excel Export
    </button>

    <button onclick="exportPDF()"
    style="background:#c0392b;color:white;width:150px;">
        📄 PDF Export
    </button>

    <button onclick="backupData()"
    style="background:#2980b9;color:white;width:150px;">
        💾 Backup
    </button>

</div>


<div class="summary-bar">
    <div>👥 गेस्ट: <span id="totalGuests">0</span></div>
    <div>💵 Cash: ₹<span id="cashShagun">0</span></div>
    <div>📱 UPI: ₹<span id="upiShagun">0</span></div>
    <div>💰 कुल: ₹<span id="totalShagun">0</span></div>
    <div>💸 निकासी: ₹<span id="totalWithdraw">0</span></div>
    <div>⚖️ शेष: ₹<span id="balanceShagun">0</span></div>
</div>

<div class="container">
    <div class="card" style="flex: 2;">
        <input type="text" id="villageFilter" placeholder="🔍 नाम/गाँव खोजें..." onkeyup="loadReport()" style="width: 95%; padding: 10px; border-radius: 8px; border: 1px solid #800000;">
        <div style="height: 400px; overflow-y: auto;">
            <table>
      

<thead>
<tr style="background:#800000; color:#ffd700;">
    <th>नाम</th>
    <th>राज्य</th>
    <th>जिला</th>
    <th>गाँव</th>
    <th>Mode</th>
    <th>शगुन</th>
</tr>
</thead>





                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="card" style="flex: 0.5;">
        <h2>💰 Cash Counter</h2>



        <div id="noteInputs">
            <div class="note-row"><label>💵 500</label><input type="number" class="note" data-val="500" oninput="calcCash()"></div>
            <div class="note-row"><label>💴 200</label><input type="number" class="note" data-val="200" oninput="calcCash()"></div>
            <div class="note-row"><label>💶 100</label><input type="number" class="note" data-val="100" oninput="calcCash()"></div>
            <div class="note-row"><label>🧾 50</label><input type="number" class="note" data-val="50" oninput="calcCash()"></div>
            <div class="note-row"><label>💳 20</label><input type="number" class="note" data-val="20" oninput="calcCash()"></div>
            <div class="note-row"><label>🪙 10</label><input type="number" class="note" data-val="10" oninput="calcCash()"></div>
            <div class="note-row"><label>🪙 5</label><input type="number" class="note" data-val="5" oninput="calcCash()"></div>
            <div class="note-row"><label>🪙 1</label><input type="number" class="note" data-val="1" oninput="calcCash()"></div>
        </div>
        <div style="background:#800000; color:white; padding:10px; margin-top:10px; text-align:center;">
            Cash: ₹<span id="cashTotal">0</span> | Diff: <span id="diffAmount">0</span>
        </div>
		
		<input
id="cashPerson"
type="text"
placeholder="नाम"
style="width:95%;padding:8px;margin-bottom:5px;"
>

<input
id="cashAmount"
type="number"
placeholder="राशि"
style="width:95%;padding:8px;margin-bottom:5px;"
>

		
		
		
		
		
		
		
        <button onclick="updateCash('withdraw')" style="background:#c0392b; color:white;">💸 Withdraw</button>
        <button onclick="updateCash('deposit')" style="background:#27ae60; color:white;">📥 Deposit</button>
        <div style="display: flex; gap: 5px;">
            <button onclick="window.location.href='index.html'" style="background:#ffd700; color:#800000;">🏠 Home</button>
            <button onclick="logout()" style="background:#333; color:white;">🚪 Logout</button>
        </div>
        <div id="historyList" style="font-size: 0.8rem; margin-top: 10px; color: #555; max-height: 150px; overflow-y: auto;"></div>
    </div>
</div>












<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const sb = window.supabase.createClient(
"https://rdlliurzgwwfjscgwssa.supabase.co",
"sb_publishable_HX1QmjO0SPyW3rUoihZkkQ_tRTE1bLc"
);

let reportData=[];

function getOfflineGuests(){

    return JSON.parse(
        localStorage.getItem("offlineGuests") || "[]"
    );

}

async function getOnlineGuests(){

    try{

        const {
            data:{user}
        } = await sb.auth.getUser();

        if(!user){
            return [];
        }

        const {data,error}=await sb
        .from("guests")
        .select("*")
        .eq("user_id",user.id)
        .order("id",{ascending:false});

        if(error){
            console.log(error);
            return [];
        }

        return data||[];

    }catch(e){

        console.log(e);

        return [];

    }

}

async function loadReport(){

    const tbody=document.getElementById("tableBody");

    tbody.innerHTML="";

    const online=await getOnlineGuests();

    const offline=getOfflineGuests();

    const map=new Map();

    online.forEach(g=>{

        let key=
        (g.name||"")+
        (g.amount||"")+
        (g.village||"");

        map.set(key,g);

    });

    offline.forEach(g=>{

        let key=
        (g.name||"")+
        (g.amount||"")+
        (g.village||"");

        if(!map.has(key)){
            map.set(key,g);
        }

    });

    reportData=[...map.values()];

    let search=document
    .getElementById("villageFilter")
    .value
    .toUpperCase();

    let total=0;
    let cash=0;
    let upi=0;
    let count=0;

    reportData.forEach(g=>{

        let txt=`
${g.name||""}
${g.state||""}
${g.district||""}
${g.village||""}
`
        .toUpperCase();

        if(search && !txt.includes(search)){
            return;
        }

        let amt=Number(g.amount)||0;

        count++;

        total+=amt;

        if(g.payment_mode==="UPI"){
            upi+=amt;
        }else{
            cash+=amt;
        }

        tbody.innerHTML+=`
<tr>
<td>${g.name||""}</td>
<td>${g.state||""}</td>
<td>${g.district||""}</td>
<td>${g.village||""}</td>
<td>${g.payment_mode||"Cash"}</td>
<td>₹${amt}</td>
</tr>
`;

    });

   document.getElementById("totalGuests").innerText = count;
document.getElementById("cashShagun").innerText = cash;
document.getElementById("upiShagun").innerText = upi;
document.getElementById("totalShagun").innerText = total;

loadHistory();

}

function calcCash(){

    let cash=0;

    document.querySelectorAll(".note").forEach(n=>{

        cash +=
        (Number(n.value)||0)
        *
        Number(n.dataset.val);

    });

    document.getElementById("cashTotal").innerText=cash;

    let balance=
    Number(
        document.getElementById("balanceShagun").innerText
    );

    let diff=cash-balance;

    document.getElementById("diffAmount").innerText=diff;

    document.getElementById("diffAmount").style.color=
    diff>=0?"green":"red";

}



async function backupData(){

    const blob=new Blob(
        [JSON.stringify(reportData,null,2)],
        {type:"application/json"}
    );

    const a=document.createElement("a");

    a.href=URL.createObjectURL(blob);

    a.download="Sagun_Backup.json";

    a.click();

}



function exportExcel(){

    const rows=reportData.map(g=>({

        Name:g.name||"",

        State:g.state||"",

        District:g.district||"",

        Village:g.village||"",

        Mode:g.payment_mode||"Cash",

        Amount:g.amount||0

    }));

    const wb=XLSX.utils.book_new();

    const ws=XLSX.utils.json_to_sheet(rows);

    XLSX.utils.book_append_sheet(
        wb,
        ws,
        "Report"
    );

    XLSX.writeFile(
        wb,
        "Shagun_Report.xlsx"
    );

}


function exportPDF(){

    const { jsPDF } = window.jspdf;

    const doc = new jsPDF("p","mm","a4");

    let total=0;
    let cash=0;
    let upi=0;

    reportData.forEach(g=>{

        total += Number(g.amount)||0;

        if(g.payment_mode==="UPI"){
            upi += Number(g.amount)||0;
        }else{
            cash += Number(g.amount)||0;
        }

    });

    doc.setFontSize(18);
    doc.setFont("helvetica","bold");
    doc.text("SHAGUN REPORT",105,15,{align:"center"});

    doc.setFontSize(10);

    doc.text("Total Guests : "+reportData.length,14,25);
    doc.text("Cash : "+cash,70,25);
    doc.text("UPI : "+upi,110,25);
    doc.text("Grand Total : "+total,150,25);

    const rows = reportData.map((g,i)=>[
        i+1,
        g.name||"",
        g.state||"",
        g.district||"",
        g.village||"",
        g.payment_mode||"",
        g.amount||0
    ]);

    doc.autoTable({

        startY:32,

        head:[[
            "SL",
            "NAME",
            "STATE",
            "DISTRICT",
            "VILLAGE",
            "MODE",
            "AMOUNT"
        ]],

        body:rows,

        theme:"grid",

        headStyles:{
            fillColor:[128,0,0],
            textColor:[255,255,255],
            halign:"center"
        },

        styles:{
            fontSize:9,
            cellPadding:2,
            valign:"middle"
        },

        columnStyles:{
            0:{cellWidth:10,halign:"center"},
            1:{cellWidth:42},
            2:{cellWidth:22},
            3:{cellWidth:28},
            4:{cellWidth:28},
            5:{cellWidth:18,halign:"center"},
            6:{cellWidth:22,halign:"right"}
        }

    });

    let finalY = doc.lastAutoTable.finalY + 10;

    doc.setFont("helvetica","bold");

    doc.text("Cash Total : "+cash,14,finalY);

    doc.text("UPI Total : "+upi,80,finalY);

    doc.text("Grand Total : "+total,145,finalY);

    doc.save("Shagun_Report.pdf");

}
let cashHistory =
JSON.parse(localStorage.getItem("cashHistory") || "[]");

function saveCashHistory(){
    localStorage.setItem(
        "cashHistory",
        JSON.stringify(cashHistory)
    );
}


async function loadHistory(){

    const box = document.getElementById("historyList");
    box.innerHTML = "";

    let withdraw = 0;
    let deposit = 0;

    let history = [];

    // Offline Data
    const offline = JSON.parse(
        localStorage.getItem("offlineCashHistory") || "[]"
    );

    history.push(...offline);

    // Online Data
    try{

        const { data:{user} } = await sb.auth.getUser();

        if(user){

            const { data } = await sb
                .from("cash_history")
                .select("*")
                .eq("user_id",user.id)
                .order("created_at",{ascending:false});

            if(data){

                data.forEach(r=>{

                    let key =
                    r.person +
                    r.amount +
                    r.type +
                    r.created_at;

                    let found = offline.find(o=>

                        (o.person+o.amount+o.type+o.created_at)==key

                    );

                    if(!found){
                        history.push(r);
                    }

                });

            }

        }

    }catch(e){

        console.log(e);

    }

    history.sort((a,b)=>{

        return new Date(b.created_at||b.date)
        -
        new Date(a.created_at||a.date);

    });

    history.forEach(h=>{

        if(h.type==="withdraw"){
            withdraw += Number(h.amount);
        }

        if(h.type==="deposit"){
            deposit += Number(h.amount);
        }

        box.innerHTML += `
<div style="padding:6px;border-bottom:1px solid #ddd;">
<b>${h.type=="withdraw"?"💸":"📥"}</b>
${h.person}
₹${h.amount}
<br>
<small>${h.created_at || h.date}</small>
</div>`;

    });

    document.getElementById("totalWithdraw").innerText = withdraw;

    let total =
    Number(document.getElementById("totalShagun").innerText);

    document.getElementById("balanceShagun").innerText =
    total - withdraw + deposit;

    calcCash();

}


async function updateCash(type){

    const person = document.getElementById("cashPerson").value.trim();
    const amount = Number(document.getElementById("cashAmount").value);

    if(person==="" || amount<=0){
        alert("नाम और राशि दर्ज करें");
        return;
    }

    const entry = {
        person: person,
        amount: amount,
        type: type,
        created_at: new Date().toISOString()
    };

    // 1. पहले Offline Save
    let offline = JSON.parse(
        localStorage.getItem("offlineCashHistory") || "[]"
    );

    offline.unshift(entry);

    localStorage.setItem(
        "offlineCashHistory",
        JSON.stringify(offline)
    );

    // 2. अगर Internet है तो तुरंत Sync
    if(navigator.onLine){

        try{

            const { data:{user} } = await sb.auth.getUser();

            if(user){

                await sb
                .from("cash_history")
                .insert([{
                    user_id:user.id,
                    person:person,
                    amount:amount,
                    type:type
                }]);

                // Sync सफल होने पर Offline से हटाओ
                offline.shift();

                localStorage.setItem(
                    "offlineCashHistory",
                    JSON.stringify(offline)
                );

            }

        }catch(e){

            console.log(e);

        }

    }

    document.getElementById("cashPerson").value="";
    document.getElementById("cashAmount").value="";

    await loadHistory();

}

async function syncCashHistory(){

    if(!navigator.onLine){
        return;
    }

    let offline = JSON.parse(
        localStorage.getItem("offlineCashHistory") || "[]"
    );

    if(offline.length===0){
        return;
    }

    const { data:{user} } = await sb.auth.getUser();

    if(!user){
        return;
    }

    for(const item of offline){

        try{

            await sb
            .from("cash_history")
            .insert([{
                user_id:user.id,
                person:item.person,
                amount:item.amount,
                type:item.type,
                created_at:item.created_at
            }]);

        }catch(e){

            console.log(e);

            return;

        }

    }

    localStorage.removeItem("offlineCashHistory");

    await loadHistory();

}


async function logout(){

    await sb.auth.signOut();

    window.location.replace("login.html");

}

window.onload = async function(){

    await syncCashHistory();

    await loadReport();

    document
    .getElementById("villageFilter")
    .addEventListener("keyup", loadReport);

};


window.addEventListener("online", async ()=>{

    await syncCashHistory();

    await loadReport();

});



</script>

</body>
</html>
