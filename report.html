async function loadReport(){

let tbody =
document.getElementById("tableBody");

tbody.innerHTML = "";

let total = 0;
let cashTotal = 0;
let upiTotal = 0;
let count = 0;

const {
data:{user}
}
=
await supabase.auth.getUser();

if(!user){
window.location.href="login.html";
return;
}

const { data,error } =
await supabase
.from("guests")
.select("*")
.eq("user_id",user.id);

if(error){
console.log(error);
return;
}

let search =
document.getElementById("villageFilter")
.value
.toUpperCase();

data.forEach((g)=>{

let fullText =
`${g.name||''}
 ${g.village||''}
 ${g.state||''}
 ${g.district||''}`
.toUpperCase();

if(search && !fullText.includes(search)){
return;
}

let amt =
Number(g.amount) || 0;

count++;
total += amt;

if(g.payment_mode==="UPI"){
upiTotal += amt;
}else{
cashTotal += amt;
}

tbody.innerHTML += `
<tr>
<td>${g.name||''}</td>
<td>${g.state||''}</td>
<td>${g.district||''}</td>
<td>${g.village||''}</td>
<td>${g.payment_mode||'Cash'}</td>
<td>₹${amt}</td>
</tr>
`;

});

document.getElementById("totalGuests").innerText = count;
document.getElementById("cashShagun").innerText = cashTotal;
document.getElementById("upiShagun").innerText = upiTotal;
document.getElementById("totalShagun").innerText = total;
document.getElementById("totalWithdraw").innerText = 0;
document.getElementById("balanceShagun").innerText = total;

calcCash();

}


async function backupData() {
    const { data } = await supabase.from("guests").select("*");
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "Sagun_Backup.json";
    a.click();
}

}

        let cash = 0;
        document.querySelectorAll('.note').forEach(i => cash += (parseInt(i.value) || 0) * parseInt(i.getAttribute('data-val')));
        document.getElementById('cashTotal').innerText = cash;
        let diff = cash - parseInt(document.getElementById('balanceShagun').innerText);
        let d = document.getElementById('diffAmount');
        d.innerText = diff;

    }

function exportPDF() {

const { jsPDF } = window.jspdf;
const doc = new jsPDF("p", "mm", "a4");

// Header
doc.setFillColor(128, 0, 0);
doc.rect(0, 0, 210, 18, "F");

doc.setTextColor(255, 255, 255);
doc.setFontSize(16);
doc.text("SHAGUN REPORT", 70, 12);

// Summary
doc.setFillColor(255,248,220);
doc.rect(10,25,190,28,"F");

doc.setTextColor(128,0,0);
doc.setFontSize(10);

doc.text("Guests : " + document.getElementById("totalGuests").innerText, 15, 33);
doc.text("Cash : Rs. " + Number(document.getElementById("cashShagun").innerText).toLocaleString("en-IN"), 70, 33);
doc.text("UPI : Rs. " + document.getElementById("upiShagun").innerText, 130, 33);

doc.text("Total : Rs. " + document.getElementById("totalShagun").innerText, 15, 45);
doc.text("Withdraw : Rs. " + document.getElementById("totalWithdraw").innerText, 70, 45);
doc.text("Balance : Rs. " + document.getElementById("balanceShagun").innerText, 130, 45);

let y = 65;

// Table Header
doc.setFillColor(128,0,0);
doc.rect(10,y-5,190,8,"F");

doc.setTextColor(255,255,255);

doc.text("Name",15,y);
doc.text("District",70,y);
doc.text("Village",110,y);
doc.text("Mode",155,y);
doc.text("Amount",180,y);

doc.setTextColor(0,0,0);

y += 10;

const rows = document.querySelectorAll("#tableBody tr");

rows.forEach((row,index)=>{

    const cols = row.querySelectorAll("td");

    const name = cols[0]?.innerText || "";
    const district = cols[2]?.innerText || "";
    const village = cols[3]?.innerText || "";
    const mode = cols[4]?.innerText || "";
   const amount = cols[5]?.innerText
   .replace(/[^0-9]/g, "") || "0";

console.log("PDF Amount Raw =", cols[5]?.innerText);
console.log("PDF Amount Clean =", amount);

const amt = Number(amount).toLocaleString("en-IN");



    if(index % 2 === 0){
        doc.setFillColor(245,245,245);
        doc.rect(10,y-5,190,8,"F");
    }

doc.text(name.substring(0,25),15,y);
doc.text(district.substring(0,15),70,y);
doc.text(village.substring(0,15),110,y);
doc.text(mode,155,y);
doc.text("Rs. " + amt,175,y);

y += 8;

    if(y > 270){

        doc.addPage();
        y = 20;

        doc.setFillColor(128,0,0);
        doc.rect(10,y-5,190,8,"F");

        doc.setTextColor(255,255,255);

        doc.text("Name",15,y);
        doc.text("District",70,y);
        doc.text("Village",110,y);
        doc.text("Mode",155,y);
        doc.text("Amount",180,y);

        doc.setTextColor(0,0,0);

        y += 10;
    }
});

doc.save("Shagun_Report.pdf");

}



	
	
	async function updateCash(type){

    const personName =
    document.getElementById("cashPerson").value;

    const amount =
    Number(
        document.getElementById("cashAmount").value
    );

    if(!personName){
        alert("नाम दर्ज करें");
        return;
    }

    if(!amount || amount <= 0){
        alert("राशि दर्ज करें");
        return;
    }


    document.getElementById("cashPerson").value = "";
    document.getElementById("cashAmount").value = "";

    await loadHistory();
    await loadReport();

    alert("सफलतापूर्वक सेव");
}
