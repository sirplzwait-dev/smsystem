
<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Sagun Management Setup</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{

background:linear-gradient(135deg,#800000,#ffd700);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}

.container{

width:100%;

max-width:430px;

background:#fff;

padding:25px;

border-radius:18px;

box-shadow:0 15px 35px rgba(0,0,0,.25);

}

h2{

text-align:center;

color:#800000;

margin-bottom:20px;

}

label{

display:block;

margin-top:12px;

font-weight:bold;

color:#800000;

}

input,
select{

width:100%;

padding:12px;

margin-top:6px;

border:2px solid #800000;

border-radius:10px;

outline:none;

font-size:15px;

}

.preview{

width:130px;

height:130px;

margin:12px auto;

border:2px dashed #800000;

border-radius:12px;

overflow:hidden;

display:flex;

justify-content:center;

align-items:center;

background:#fafafa;

}

.preview img{

width:100%;

height:100%;

object-fit:cover;

}

button{

width:100%;

padding:13px;

margin-top:18px;

border:none;

border-radius:10px;

background:#800000;

color:#fff;

font-size:16px;

font-weight:bold;

cursor:pointer;

}

button:hover{
    background:#650000;
}

.photoActions{
    display:flex;
    gap:10px;
    margin-top:8px;
}
.photoActions button{

    margin:0;

    padding:10px;

    font-size:14px;

    color:#ffffff;

    display:flex;

    justify-content:center;

    align-items:center;

    gap:6px;

    white-space:nowrap;

}

.photoActions button:first-child{

    min-width:120px;

}


.cropModal{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

display:none;

justify-content:center;

align-items:center;

background:rgba(0,0,0,.8);

z-index:9999;

}

.cropBox{
    width:95%;
    max-width:500px;
    max-height:95vh;
    background:#fff;
    padding:15px;
    border-radius:15px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}
.cropBox img{
    display:block;
    width:100%;
    max-height:60vh;
    object-fit:contain;
}

.tools{
    display:flex;
    gap:8px;
    margin-top:15px;
    flex-wrap:wrap;
    overflow-y:auto;
}

.tools button{

flex:1;

margin:0;

}

.progress{

display:none;

margin-top:15px;

width:100%;

height:8px;

background:#ddd;

border-radius:20px;

overflow:hidden;

}

.progress div{

height:100%;

width:0%;

background:#800000;

}


@media (max-width:600px){

.cropBox{
    width:100%;
    height:100vh;
    max-height:100vh;
    border-radius:0;
    padding:10px;
}

.cropBox img{
    max-height:55vh;
}

.tools button{
    flex:1 1 45%;
    font-size:14px;
    padding:12px;
}

}


</style>

</head>

<body>

<div class="container">

<h2>शादी विवरण सेटअप</h2>

<label>कार्यक्रम</label>

<select id="weddingType">

<option value="">चुनें</option>

<option value="boy">लड़का (तिलक)</option>

<option value="girl">लड़की (बरात)</option>

</select>

<label>कार्यक्रम तिथि</label>

<input type="date" id="eventDate">



<label>दुल्हन का नाम</label>

<input type="text" id="brideName">

<div class="preview">
    <img id="bridePreview"
         src="https://placehold.co/130x130?text=Bride">
</div>

<div class="photoActions">
<button type="button"
onclick="
document.getElementById('bridePhoto').value='';
document.getElementById('bridePhoto').click();
">
📷 Change
</button>

    <button type="button"
        onclick="removePhoto('bride')">
        🗑 Remove
    </button>
</div>

<input
type="file"
id="bridePhoto"
accept="image/*">


<label>दूल्हा का नाम</label>

<input type="text" id="groomName">

<div class="preview">
    <img id="groomPreview"
         src="https://placehold.co/130x130?text=Groom">
</div>

<div class="photoActions">
  <button type="button"
onclick="
document.getElementById('groomPhoto').value='';
document.getElementById('groomPhoto').click();
">
📷 Change
</button>

    <button type="button"
        onclick="removePhoto('groom')">
        🗑 Remove
    </button>
</div>

<input
type="file"
id="groomPhoto"
accept="image/*">


<label>UPI QR Code</label>

<div class="preview">
    <img id="qrPreview"
         src="https://placehold.co/130x130?text=QR">
</div>

<div class="photoActions">
    <button type="button"
        onclick="document.getElementById('qrPhoto').click()">
        📷 Change
    </button>

    <button type="button"
        onclick="removePhoto('qr')">
        🗑 Remove
    </button>
</div>

<input
type="file"
id="qrPhoto"
accept="image/*">


<label>स्वागतकर्ता का नाम</label>

<input

type="text"

id="welcomeName">

<button id="saveBtn" onclick="submitSetup()">
🚀 Save Setup

</button>

</div>

<div class="cropModal"

id="cropModal">

<div class="cropBox">

<img id="cropImage">

<div class="tools">

<button id="zoomIn">＋</button>

<button id="zoomOut">－</button>

<button id="rotateLeft">⟲</button>

<button id="rotateRight">⟳</button>

<button id="cropSave">✔ Save</button>

<button id="cropCancel">✖ Close</button>

</div>

<div class="progress">

<div id="progressBar"></div>

</div>

</div>

</div>

<script>

const sb = window.supabase.createClient(
    "https://rdlliurzgwwfjscgwssa.supabase.co",
    "sb_publishable_HX1QmjO0SPyW3rUoihZkkQ_tRTE1bLc"
);





// ===== IMAGE VARIABLES =====

let cropper = null;

let currentInput = null;
let currentPreview = null;

let croppedBride = null;
let croppedGroom = null;
let croppedQR = null;

const cropModal = document.getElementById("cropModal");
const cropImage = document.getElementById("cropImage");


// ===== FILE EVENTS =====

document.getElementById("bridePhoto").addEventListener("change", function (e) {
    openCrop(e.target.files[0], "bridePhoto", "bridePreview");
});

document.getElementById("groomPhoto").addEventListener("change", function (e) {
    openCrop(e.target.files[0], "groomPhoto", "groomPreview");
});

document.getElementById("qrPhoto").addEventListener("change", function (e) {
    openCrop(e.target.files[0], "qrPhoto", "qrPreview");
});



// ===== OPEN CROPPER =====

function openCrop(file, inputId, previewId) {

    if (!file) return;

    currentInput = inputId;
    currentPreview = previewId;

    const reader = new FileReader();

    reader.onload = function (e) {

        cropModal.style.display = "flex";

        cropImage.src = e.target.result;

        if (cropper) {
            cropper.destroy();
        }

    cropper = new Cropper(cropImage,{
    aspectRatio:1,
    viewMode:1,
    autoCropArea:1,
    responsive:true,
    restore:false,
    checkOrientation:false,
    modal:true,
    guides:false,
    dragMode:"move",
    background:false,
    movable:true,
    zoomable:true,
    rotatable:true,
    scalable:true
});
    };

    reader.readAsDataURL(file);

}


// ===== ZOOM =====

document.getElementById("zoomIn").onclick = function () {
    if (cropper) cropper.zoom(0.1);
};

document.getElementById("zoomOut").onclick = function () {
    if (cropper) cropper.zoom(-0.1);
};

// ===== ROTATE =====

document.getElementById("rotateLeft").onclick = function () {
    if (cropper) cropper.rotate(-90);
};

document.getElementById("rotateRight").onclick = function () {
    if (cropper) cropper.rotate(90);
};

// ===== CLOSE CROPPER =====

document.getElementById("cropCancel").onclick = function () {

    cropModal.style.display = "none";

    if (cropper) {
        cropper.destroy();
        cropper = null;
    }

};


// ===== SAVE CROPPED IMAGE =====

document.getElementById("cropSave").onclick = async function () {

    if (!cropper) return;

    const canvas = cropper.getCroppedCanvas({
        width: 800,
        height: 800,
        imageSmoothingQuality: "high"
    });

    const blob = await new Promise(resolve =>
        canvas.toBlob(resolve, "image/jpeg", 0.9)
    );

  // Compression Settings

const options = {

    maxSizeMB: currentInput === "qrPhoto" ? 0.15 : 0.30,

    maxWidthOrHeight: currentInput === "qrPhoto" ? 600 : 800,

    initialQuality: currentInput === "qrPhoto" ? 0.95 : 0.90,

    alwaysKeepResolution: false,

    useWebWorker: true

};

const compressed = await imageCompression(blob, options);
    document.getElementById(currentPreview).src =
        URL.createObjectURL(compressed);
		formChanged = true;

    if (currentInput === "bridePhoto") {
        croppedBride = compressed;
    }

    if (currentInput === "groomPhoto") {
        croppedGroom = compressed;
    }

    if (currentInput === "qrPhoto") {
        croppedQR = compressed;
    }

cropper.destroy();
cropper = null;

cropModal.style.display = "none";

// File Input Reset
document.getElementById(currentInput).value = "";
}




// ==========================
// SAVE SETUP
// ==========================

async function submitSetup(){

const btn=document.getElementById("saveBtn");

btn.disabled=true;
btn.innerHTML="⏳ Saving...";

try{

const {data:{user},error:userError}=await sb.auth.getUser();

if(userError || !user){

alert("Please Login First");

location.href="login.html";

return;

}

let brideUrl="";
let groomUrl="";
let qrUrl="";


// ---------- Bride Upload ----------

if(croppedBride){

btn.innerHTML="📷 Uploading Bride...";

const {error}=await sb.storage
.from("photos")
.upload(user.id+"/bride.jpg",croppedBride,{
upsert:true
});

if(error) throw error;

brideUrl=sb.storage
.from("photos")
.getPublicUrl(user.id+"/bride.jpg")
.data.publicUrl;

}


// ---------- Groom Upload ----------

if(croppedGroom){

btn.innerHTML="🤵 Uploading Groom...";

const {error}=await sb.storage
.from("photos")
.upload(user.id+"/groom.jpg",croppedGroom,{
upsert:true
});

if(error) throw error;

groomUrl=sb.storage
.from("photos")
.getPublicUrl(user.id+"/groom.jpg")
.data.publicUrl;

}


// ---------- QR Upload ----------

if(croppedQR){

btn.innerHTML="💳 Uploading QR...";

const {error}=await sb.storage
.from("photos")
.upload(user.id+"/qr.jpg",croppedQR,{
upsert:true
});

if(error) throw error;

qrUrl=sb.storage
.from("photos")
.getPublicUrl(user.id+"/qr.jpg")
.data.publicUrl;

}


// ---------- Save Database ----------

btn.innerHTML="💾 Saving...";

const {error}=await sb
.from("setup")
.upsert([{

user_id:user.id,

wedding_type:
document.getElementById("weddingType").value,

event_date:
document.getElementById("eventDate").value,

bride_name:
document.getElementById("brideName").value,

groom_name:
document.getElementById("groomName").value,

welcome_name:
document.getElementById("welcomeName").value,

bride_photo_url:brideUrl,

groom_photo_url:groomUrl,

qr_url:qrUrl

}],{

onConflict:"user_id"

});

if(error) throw error;


btn.innerHTML="✅ Setup Completed";
formChanged = false;

setTimeout(()=>{

window.location.href="index.html";

},1000);

}catch(err){

alert(err.message);

btn.disabled=false;

btn.innerHTML="🚀 Save Setup";

}

}
// =========================
// REMOVE PHOTO
// =========================

function removePhoto(type){

    formChanged = true;

    if(type==="bride"){

        croppedBride = null;

        document.getElementById("bridePreview").src =
        "https://placehold.co/130x130?text=Bride";

        document.getElementById("bridePhoto").value = "";

    }

    if(type==="groom"){

        croppedGroom = null;

        document.getElementById("groomPreview").src =
        "https://placehold.co/130x130?text=Groom";

        document.getElementById("groomPhoto").value = "";

    }

    if(type==="qr"){

        croppedQR = null;

        document.getElementById("qrPreview").src =
        "https://placehold.co/130x130?text=QR";

        document.getElementById("qrPhoto").value = "";

    }

}
</script>

</body>

</html>
