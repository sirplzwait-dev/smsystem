<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Sagun Management System</title>
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
		<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow-y:auto;
overflow-x:hidden;
background:linear-gradient(-45deg,#5b0000,#800000,#b8860b,#ffd700);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
position:relative;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

body::before,
body::after{
content:"";
position:absolute;
border-radius:50%;
background:rgba(255,255,255,.08);
animation:float 8s ease-in-out infinite;
}

body::before{
width:240px;
height:240px;
top:-70px;
left:-70px;
}

body::after{
width:320px;
height:320px;
bottom:-100px;
right:-100px;
animation-delay:3s;
}

@keyframes float{
50%{
transform:translateY(-25px);
}
}

.register-box{
max-width:420px;
margin:20px;
    width:100%;
	padding:18px 25px 20px;
    padding:20px;
    border-radius:22px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.25);
    box-shadow:0 25px 50px rgba(0,0,0,.35);
    text-align:center;
    color:#fff;
    animation:fade .8s ease;
}
@keyframes fade{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
width:70px;
height:70px;
border-radius:50%;
border:4px solid #FFD700;
background:#fff;
padding:5px;
margin-bottom:10px;
animation:pulse 2.5s infinite;
}

@keyframes pulse{
50%{
transform:scale(1.08);
}
}

.register-box h2{
    font-size:32px;
    margin:0 0 8px;
}

.subtitle{
    margin-bottom:10px;
    line-height:1.4;
}

.input-group{
position:relative;
margin:8px 0;
}

input{
width:100%;
padding:12px;
padding-right:50px;
border:none;
border-radius:12px;
outline:none;
font-size:14px;
background:rgba(255,255,255,.95);
transition:.3s;
}

input:focus{
box-shadow:0 0 12px gold;
}

.eye{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:20px;
user-select:none;
}

.cf-turnstile{
margin:15px auto;
display:flex;
justify-content:center;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#FFD700;
color:#800000;
font-size:17px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}
button:disabled{
cursor:not-allowed;
opacity:.8;
}


button:hover{
transform:translateY(-2px);
}

.loader{
display:inline-block;
width:18px;
height:18px;
border:3px solid rgba(255,255,255,.4);
border-top:3px solid #800000;
border-radius:50%;
animation:spin .8s linear infinite;
margin-right:8px;
vertical-align:middle;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}

}

.login-link{
margin-top:18px;
font-size:15px;
}

.login-link a{
color:#FFD700;
font-weight:bold;
text-decoration:none;
}

.login-link a:hover{
text-decoration:underline;
}

.input-box{
    position:relative;
    margin:10px 0;
}

.input-box input{
    width:100%;
    height:46px;
    padding:0 14px 0 42px;
    border-radius:12px;
    border:1.5px solid rgba(255,215,0,.35);
    background:#fff;
    color:#333;
    font-size:15px;
    font-weight:500;
    box-shadow:0 3px 8px rgba(0,0,0,.08);
}

.input-box input:focus{
    border-color:#FFD700;
    box-shadow:0 0 10px rgba(255,215,0,.45);
}

.icon{
    position:absolute;
    left:14px;
    top:50%;
    transform:translateY(-50%);
    font-size:16px;
}



.cf-turnstile{
    display:flex;
    justify-content:center;
    margin:8px 0;
    transform:scale(0.75);
    transform-origin:center;
}




</style>
		
</head>
<body>



<div class="register-box">



<h2>📝 Create Account</h2>

<p class="subtitle">
Register to continue to
<br>
<b>Sagun Management System</b>
</p>

<div class="input-box">
    <span class="icon">👤</span>
    <input type="text" id="name" placeholder="Full Name">
</div>

<div class="input-box">
    <span class="icon">📍</span>
    <input type="text" id="state" placeholder="State">
</div>

<div class="input-box">
    <span class="icon">📱</span>
    <input type="text" id="mobile" placeholder="Mobile Number">
</div>

<div class="input-box">
    <span class="icon">📧</span>
    <input type="email" id="email" placeholder="Email">
</div>

<div class="input-group">
<input
type="password"
id="password"
placeholder="🔒 Password">

<span class="eye" id="eye1">👁️</span>
</div>

<div class="input-group">
<input
type="password"
id="confirmPassword"
placeholder="🔒 Confirm Password">

<span class="eye" id="eye2">👁️</span>
</div>

<div
class="cf-turnstile"
data-sitekey="0x4AAAAAADsJ5QnV0fxq-nS0"
data-theme="light"
data-language="en">
</div>

<button
type="button"
id="registerBtn"
onclick="registerUser()">
📝 Register
</button>

<div class="login-link">
Already have an account?
<br>
<a href="login.html">
Login
</a>
</div>
</div>

<script>
const SUPABASE_URL =
"https://rdlliurzgwwfjscgwssa.supabase.co";

const SUPABASE_KEY =
"sb_publishable_HX1QmjO0SPyW3rUoihZkkQ_tRTE1bLc";

const sb = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);



function generateKey(prefix){

return prefix + "-" +
Math.floor(100000 + Math.random() * 900000);

}

function showLoading(){

const btn =
document.getElementById("registerBtn");

btn.disabled = true;

btn.innerHTML = `
<span class="loader"></span>
Please Wait...
`;

}

function hideLoading(){

const btn =
document.getElementById("registerBtn");

btn.disabled = false;

btn.innerHTML =
"📝 Register";

}

function togglePassword(id,eye){

const input =
document.getElementById(id);

if(input.type==="password"){

input.type="text";
eye.innerHTML="🙈";

}else{

input.type="password";
eye.innerHTML="👁️";

}

}

document.getElementById("eye1").onclick=function(){

togglePassword("password",this);

};

document.getElementById("eye2").onclick=function(){

togglePassword("confirmPassword",this);

};


async function registerUser() {

    showLoading();

    const name = document.getElementById("name").value.trim();
    const state = document.getElementById("state").value.trim();
    const mobile = document.getElementById("mobile").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (!name || !email || !password || !confirmPassword) {
        hideLoading();
        return alert("Please fill all required fields.");
    }

    if (password !== confirmPassword) {
        hideLoading();
        return alert("Passwords do not match.");
    }

    const token = document.querySelector(
        'input[name="cf-turnstile-response"]'
    )?.value;

    if (!token) {
        hideLoading();
        return alert("Please complete CAPTCHA.");
    }

    const verify = await fetch(
        "https://rdlliurzgwwfjscgwssa.supabase.co/functions/v1/verify-turnstile",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ token })
        }
    );

    const result = await verify.json();

    if (!result.success) {
        hideLoading();
        return alert("CAPTCHA verification failed.");
    }

    const { error } = await sb.auth.signUp({
        email,
        password,
        options: {
            emailRedirectTo: "https://sgunms.in/setup.html",
            data: {
                name,
                state,
                mobile
            }
        }
    });

    hideLoading();

    if (error) {
        return alert(error.message);
    }

    alert(
        "Registration Successful!\n\nPlease verify your email before login."
    );

    window.location.href = "login.html";
}

</script>





</body>
</html>
